name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: applyflow
          POSTGRES_PASSWORD: applyflow
          POSTGRES_DB: applyflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U applyflow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: |
          ruff check src tests
          mypy src
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://applyflow:applyflow@localhost:5432/applyflow
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
